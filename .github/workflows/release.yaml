name: Build and Release

on:
  push:
    tags:
      - 'build-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        architecture: [x64, x86]
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: ${{ matrix.architecture }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executables
      run: |
        pyinstaller --onefile --console --clean --name markitdown-cli-${{ matrix.architecture }} markitdown-cli.py
        pyinstaller --onefile --noconsole --clean --name launcher-${{ matrix.architecture }} launcher.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: builds-${{ matrix.architecture }}
        path: dist/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-builds
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: all-builds/*.exe
        # Questo genera una release "bozza" così puoi scriverci le note prima di pubblicarla
        draft: false 
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
