name: Build and Release

on:
  push:
    tags:
      - 'build-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: x64

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executables
      run: |
        # Nomi file originali
        pyinstaller --onefile --console --clean --name markitdown-cli markitdown-cli.py
        pyinstaller --onefile --noconsole --clean --name launcher launcher.py

    - name: Create ZIP Archive
      shell: pwsh
      run: |
        # Crea uno zip contenente entrambi i file dalla cartella dist
        Compress-Archive -Path dist/markitdown-cli.exe, dist/launcher.exe -DestinationPath markitdown-win-x64.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: markitdown-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
